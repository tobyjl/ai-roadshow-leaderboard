<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E.ON Next Roadshow Leaderboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="eon-container">
        <!-- Brand Header -->
        <div class="eon-header">
            <img src="eon_next_logo.png" alt="E.ON Next" class="eon-logo" onerror="this.style.display='none'; document.getElementById('fallback-logo').style.display='block';">
            <div id="fallback-logo" class="eon-wordmark" style="display: none;">
                <span class="eon-word-eon">e·on</span><span class="eon-word-next">next</span>
            </div>
            <div class="eon-title">Roadshow Live Tournament</div>
            <div class="eon-sub">Real-time team performance tracking across all stalls</div>
        </div>

        <!-- Mode Controls -->
        <div class="controls-card">
            <button id="auto-toggle-btn" class="eon-toggle-btn active">🔄 Auto-Detect Session</button>
            <button id="test-toggle-btn" class="eon-toggle-btn">🧹 Hide Test Entries</button>
            <div class="filter-group">
                <label for="session-select">Active Bracket:</label>
                <select id="session-select" disabled>
                    <!-- Day 1 (July 15) -->
                    <option value="Day 1: 9:30am">Day 1 — Session 1 · 09:30</option>
                    <option value="Day 1: 11:00am">Day 1 — Session 2 · 11:00</option>
                    <option value="Day 1: 1:00pm">Day 1 — Session 3 · 13:00</option>
                    <option value="Day 1: 2:30pm">Day 1 — Session 4 · 14:30</option>
                    <!-- Day 2 (July 16) -->
                    <option value="Day 2: 9:30am">Day 2 — Session 1 · 09:30</option>
                    <option value="Day 2: 11:00am">Day 2 — Session 2 · 11:00</option>
                    <option value="Day 2: 1:00pm">Day 2 — Session 3 · 13:00</option>
                    <option value="Day 2: 2:30pm">Day 2 — Session 4 · 14:30</option>
                </select>
            </div>
            <a href="timer.html" class="timer-link">⏱ Open Live Timer</a>
            <div id="last-updated" class="last-updated">Last updated: —</div>
        </div>

        <!-- Dual Leaderboard Grid Layout -->
        <div class="leaderboard-grid">
            <!-- Left Column: Session -->
            <div class="eon-card">
                <div class="eon-step">🕒 Current Session Standings</div>
                <div id="session-container">
                    <div class="loading">Loading current session...</div>
                </div>
            </div>

            <!-- Right Column: All-Time -->
            <div class="eon-card">
                <div class="eon-step">🏆 All-Time Top Teams</div>
                <div id="all-time-container">
                    <div class="loading">Loading tournament standings...</div>
                </div>
            </div>
        </div>
    </div>

    <script src="schedule.js"></script>
    <script src="app.js"></script>
</body>
</html>
